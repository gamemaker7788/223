<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>出题 + 投票（无限轮）</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
:root{--bg:#fff;--text:#333;--gray:#bbb;--primary:#38bdf8;--danger:#ef4444;}
body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica Neue,Arial,sans-serif;padding:20px}
.card{max-width:680px;margin:auto;border:2px solid var(--gray);border-radius:14px;padding:24px}
h2{margin:0 0 12px}
label{display:block;margin:10px 0 4px;font-size:14px}
input,textarea{width:100%;padding:10px;font-size:15px;border:2px solid var(--gray);border-radius:6px;box-sizing:border-box}
textarea{min-height:100px;resize:vertical}
.btn-group{display:flex;gap:12px;margin-top:20px}
button{padding:10px 20px;font-size:15px;border:2px solid var(--primary);border-radius:6px;background:var(--primary);color:#fff;cursor:pointer}
button:disabled{background:var(--gray);border-color:var(--gray);cursor:not-allowed}
.option{display:flex;align-items:center;justify-content:space-between;margin:10px 0}
.bar{height:8px;background:var(--gray);border-radius:4px;overflow:hidden;margin-top:6px}
.bar-inner{height:100%;background:var(--primary);transition:width .3s}
.percent{font-size:13px;color:var(--gray)}
#tip{height:20px;font-size:13px;color:var(--gray);text-align:center;margin-top:12px}
.err{color:var(--danger);font-size:13px;text-align:center;margin-bottom:10px}
.hide{display:none}
</style>
</head>
<body>

<!-- ===== 出题区 ===== -->
<section id="createPanel" class="card">
  <h2>创建新一轮投票</h2>
  <div id="err" class="err hide"></div>

  <label>轮次ID（留空自动生成）</label>
  <input id="roundId" placeholder="r1 或留空">

  <label>标题</label>
  <input id="roundTitle" placeholder="第1轮：你最喜欢的编程语言">

  <label>选项（每行一个，≥2）</label>
  <textarea id="roundOptions" placeholder="Python&#10;JavaScript&#10;Go&#10;Rust"></textarea>

  <div class="btn-group">
    <button onclick="createRound()">创建轮次</button>
  </div>
  <p id="createTip" style="text-align:center;font-size:13px;color:var(--gray)"></p>
</section>

<!-- ===== 投票区 ===== -->
<section id="votePanel" class="card hide">
  <h2 id="voteTitle"></h2>
  <p id="voteDesc" class="percent"></p>

  <div id="optionBox"></div>

  <div class="btn-group">
    <button id="submitBtn" onclick="submitRound()">提交本轮</button>
    <button onclick="backToCreate()">放弃/重出题</button>
  </div>
  <p id="tip"></p>
</section>

<script>
/* ========== 配置 ========== */
const SB_URL   = 'https://jbcrkuwnlmdmwwmiimhr.supabase.co/rest/v1';
const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpiY3JrdXdubG1kbXd3bWlpbWhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ0ODcyNjUsImV4cCI6MjA4MDA2MzI2NX0.mK7o1xaVrV39J6_wahE_1iv_cacYUVrZJurKs_s2Wf0';
const TABLE_ROUND = 'voting_rounds';
const TABLE_VOTE  = 'round_votes';

/* ========== 用户 UUID ========== */
function uuidv4(){
  return ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g,c=>
    (c^crypto.getRandomValues(new Uint8Array(1))[0]&15>>c/4).toString(16));
}
const userId = localStorage.getItem('vote_user_id') || (u=>{localStorage.setItem('vote_user_id',u);return u;})(uuidv4());

/* ========== 出题 ========== */
async function createRound(){
  let rid  = document.getElementById('roundId').value.trim();
  const tit  = document.getElementById('roundTitle').value.trim();
  const opts = document.getElementById('roundOptions').value.split('\n').map(o=>o.trim()).filter(Boolean);
  if (!tit || opts.length<2){ showErr('请填完整（选项≥2）'); return;}
  // 自动生成唯一ID
  if (!rid) rid = 'r' + Date.now();
  else {
     // 检测重复：简单在后缀加时间戳
     const exist = await fetch(`${SB_URL}/${TABLE_ROUND}?round_id=eq.${rid}&select=round_id`,{headers:{apikey:ANON_KEY}});
     if (exist.ok && (await exist.json()).length){
       rid += '_' + Date.now();
       showErr('该ID已存在，已自动改为 '+rid);
     }
  }

  const payload = {
    round_id : rid,
    title    : tit,
    options  : opts,
    start_at : new Date().toISOString(),
    end_at   : null
  };

  const res = await fetch(`${SB_URL}/${TABLE_ROUND}`,{
    method:'POST',
    headers:{'Content-Type':'application/json',apikey:ANON_KEY,Prefer:'return=minimal'},
    body: JSON.stringify(payload)
  });
  if (!res.ok){ const txt = await res.text(); showErr('创建失败：'+txt); return;}
  showCreateTip('创建成功！立即进入投票…');
  setTimeout(()=> enterRound(rid, tit, '', opts), 500);
}

/* ========== 进入投票 ========== */
function enterRound(rid, tit, desc, opts){
  document.getElementById('createPanel').classList.add('hide');
  document.getElementById('votePanel').classList.remove('hide');
  document.getElementById('voteTitle').textContent = tit;
  document.getElementById('voteDesc').textContent  = desc;
  renderOptions(opts, rid);
}

/* ========== 渲染选项 + 进度占位 ========== */
function renderOptions(opts, rid){
  currentRound = {round_id:rid, options:opts};
  picks = [];
  const box = document.getElementById('optionBox');
  box.innerHTML = opts.map((o,i)=>`
    <div class="option">
      <label><input type="checkbox" ${picks.includes(o)?'checked':''} onchange="togglePick('${o.replace(/'/g,"\\'")}')"> ${o}</label>
    </div>
    <div class="percent" id="pct-${i}">0 %</div>
    <div class="bar"><div class="bar-inner" id="bar-${i}" style="width:0%"></div></div>
  `).join('');
  document.getElementById('submitBtn').disabled = false;
  fetchProgress();
}

/* ========== 勾选 ========== */
let picks = [];
function togglePick(opt){
  const idx = picks.indexOf(opt);
  idx>-1 ? picks.splice(idx,1) : picks.push(opt);
}

/* ========== 提交 ========== */
async function submitRound(){
  if (!picks.length){ tip.textContent='至少选一项'; return;}
  const res = await fetch(`${SB_URL}/${TABLE_VOTE}`,{
    method:'POST',
    headers:{'Content-Type':'application/json',apikey:ANON_KEY,Prefer:'resolution=merge-duplicates'},
    body:JSON.stringify({
      user_id   : userId,
      round_id  : currentRound.round_id,
      picks     : picks,
      updated_at: new Date().toISOString()
    })
  });
  if (!res.ok){ tip.textContent='提交失败'; return;}
  tip.textContent='提交成功！';
  document.getElementById('submitBtn').disabled = true;
  fetchProgress();
}

/* ========== 实时进度 ========== */
async function fetchProgress(){
  const res = await fetch(`${SB_URL}/${TABLE_VOTE}?round_id=eq.${currentRound.round_id}&select=picks`,{headers:{apikey:ANON_KEY}});
  const rows = res.ok ? await res.json() : [];
  const cnt={}; let total=0;
  rows.forEach(r=>{ r.picks.forEach(o=>{ cnt[o]=(cnt[o]||0)+1; total++; }); });
  currentRound.options.forEach((o,i)=>{
    const p = total?(cnt[o]||0)/total*100:0;
    document.getElementById(`pct-${i}`).textContent = `${p.toFixed(1)} %`;
    document.getElementById(`bar-${i}`).style.width = `${p}%`;
  });
}

/* ========== 返回出题 ========== */
function backToCreate(){
  document.getElementById('votePanel').classList.add('hide');
  document.getElementById('createPanel').classList.remove('hide');
}

/* ========== 小工具 ========== */
function showErr(msg){ const e=document.getElementById('err'); e.textContent=msg; e.classList.remove('hide'); }
function showCreateTip(msg){ document.getElementById('createTip').textContent=msg; }
const tip=document.getElementById('tip');

/* ========== 全局变量 ========== */
let currentRound = null;

</script>
</body>
</html>
